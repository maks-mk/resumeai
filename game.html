<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cyber Nodes Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --panel-bg: rgba(17, 24, 39, 0.75);
            --grid-line: rgba(0, 243, 255, 0.15);
            --text-color: #e2e8f0;
            --accent-cyan: #00f3ff;
            --accent-pink: #bc13fe;
            --accent-green: #22c55e;
            --accent-yellow: #eab308;
            --accent-alert: #ff2a6d;
            --shadow-glow: rgba(0, 243, 255, 0.4);
            --clip-panel: polygon(0 15px, 15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
            --clip-btn: polygon(0 8px, 8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%);
        }

        body {
            font-family: 'Fira Code', monospace;
            background-color: transparent;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
            box-sizing: border-box;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            /* Ключевое изменение: ширина не превышает 70% от высоты экрана, чтобы поле масштабировалось */
            max-width: min(380px, 90vw, 70vh);
            margin: 0 auto;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--accent-cyan);
            padding: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 243, 255, 0.1);
            text-align: center;
            position: relative;
            clip-path: var(--clip-panel);
        }

        h1 {
            font-size: 1.2rem;
            margin: 0 0 12px 0;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--accent-cyan);
            position: relative;
            display: inline-block;
        }

        h1::before, h1::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.8;
        }
        h1::before { left: 2px; text-shadow: -2px 0 var(--accent-alert); clip: rect(24px, 550px, 36px, 0); animation: glitch 3s infinite linear alternate-reverse; }
        h1::after { left: -2px; text-shadow: -2px 0 var(--accent-cyan); clip: rect(10px, 550px, 20px, 0); animation: glitch2 2.5s infinite linear alternate-reverse; }

        @keyframes glitch { 0% { clip: rect(10px, 9999px, 30px, 0); } 100% { clip: rect(0, 0, 0, 0); } }
        @keyframes glitch2 { 0% { clip: rect(5px, 9999px, 20px, 0); } 100% { clip: rect(0, 0, 0, 0); } }

        .score-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--grid-line);
            clip-path: var(--clip-btn);
        }

        .score-item {
            font-size: 0.75rem;
            color: #94a3b8;
            letter-spacing: 1px;
        }
        
        .score-item span {
            color: var(--accent-cyan);
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 0 0 8px var(--accent-cyan);
            display: block;
            margin-top: 3px;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
            margin: 0 auto;
            width: 100%;
            aspect-ratio: 1; /* Сохраняет поле квадратным */
            background: rgba(0, 0, 0, 0.6);
            padding: 4px;
            border: 1px solid var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0,243,255,0.1), inset 0 0 30px rgba(0,0,0,0.9);
            position: relative;
        }

        #board::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 10px;
            background: linear-gradient(to bottom, rgba(0,243,255,0.5), transparent);
            animation: scan 4s linear infinite;
            pointer-events: none; opacity: 0.5; z-index: 10;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .cell {
            aspect-ratio: 1;
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dotted rgba(0, 243, 255, 0.2);
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }

        .cell:hover {
            background: rgba(0, 243, 255, 0.2);
            border: 1px solid var(--accent-cyan);
        }

        .ball {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60%; height: 60%;
            border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cyan { background: radial-gradient(circle, #fff 10%, var(--accent-cyan) 60%); box-shadow: 0 0 10px var(--accent-cyan); }
        .pink { background: radial-gradient(circle, #fff 10%, var(--accent-pink) 60%); box-shadow: 0 0 10px var(--accent-pink); }
        .green { background: radial-gradient(circle, #fff 10%, var(--accent-green) 60%); box-shadow: 0 0 10px var(--accent-green); }
        .yellow { background: radial-gradient(circle, #fff 10%, var(--accent-yellow) 60%); box-shadow: 0 0 10px var(--accent-yellow); }
        .alert { background: radial-gradient(circle, #fff 10%, var(--accent-alert) 60%); box-shadow: 0 0 10px var(--accent-alert); }

        .bonus-ball {
            border: 2px solid #fff;
            animation: pulse-bonus 0.8s infinite alternate;
        }

        @keyframes pulse-bonus {
            0% { transform: translate(-50%, -50%) scale(0.9); filter: brightness(1.2); }
            100% { transform: translate(-50%, -50%) scale(1.2); filter: brightness(2); box-shadow: 0 0 20px #fff; }
        }

        #controls {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 8px 16px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            cursor: pointer;
            clip-path: var(--clip-btn);
            transition: all 0.4s;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,243,255,0.4), transparent);
            transition: 0.4s;
        }

        button:hover {
            background: var(--accent-cyan); color: #000;
            box-shadow: 0 0 15px var(--shadow-glow);
        }
        button:hover::before { left: 100%; }

        .combo-text {
            position: absolute; color: #fff; font-weight: bold; font-size: 1.2em;
            text-shadow: 0 0 10px var(--accent-pink);
            animation: floatUp 1s ease-out forwards; pointer-events: none; z-index: 20;
        }

        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-40px) scale(1.5); opacity: 0; } }

        .game-over {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(3, 7, 18, 0.95);
            backdrop-filter: blur(8px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .game-over.show { opacity: 1; pointer-events: auto; }

        .game-over h2 {
            color: var(--accent-alert); font-size: 1.8rem;
            text-shadow: 0 0 20px rgba(255, 42, 109, 0.8);
            margin-bottom: 10px; letter-spacing: 2px;
            animation: glitch2 0.5s infinite linear alternate-reverse;
        }

        .high-score { color: var(--accent-yellow); margin-bottom: 20px; text-shadow: 0 0 10px var(--accent-yellow); font-size: 0.9rem;}
    </style>
</head>
<body>

<div id="game-container">
    <h1 data-text="SYSTEM NODES">SYSTEM NODES</h1>
    <div class="score-panel">
        <div class="score-item">SCORE<span id="score">0</span></div>
        <div class="score-item">COMBO<span id="combo">x1</span></div>
        <div class="score-item">BEST<span id="high-score">0</span></div>
    </div>
    
    <div id="board"></div>
    
    <div id="controls">
        <div class="score-item" style="text-align: left;">LINES<br><span id="lines-removed-count" style="display:inline; margin-top:0;">0</span></div>
        <button id="new-game-button">REBOOT_SYS()</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>SYSTEM FAILURE</h2>
        <div class="score-item" style="margin-bottom: 10px; font-size: 1rem; color: #fff;">FINAL SCORE: <span id="final-score" style="color: var(--accent-cyan);">0</span></div>
        <div class="high-score">RECORD: <span id="final-high-score">0</span></div>
        <button id="restart-button" style="border-color: var(--accent-alert); color: var(--accent-alert);">RETRY_CONNECTION</button>
    </div>
</div>

<script>
    const board = document.getElementById('board');
    const colors = ['cyan', 'pink', 'green', 'yellow', 'alert'];
    let grid = [];
    let selectedBall = null;
    let score = 0;
    let highScore = localStorage.getItem('linesHighScore') || 0;
    let comboMultiplier = 1;
    let linesRemoved = 0;
    let lastMoveTime = Date.now();
    const COMBO_TIMEOUT = 5000;

    function init() {
        document.getElementById('high-score').textContent = highScore;
        document.getElementById('new-game-button').addEventListener('click', newGame);
        document.getElementById('restart-button').addEventListener('click', newGame);
        newGame();
    }

    function createBoard() {
        board.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            grid[i] = [];
            for (let j = 0; j < 10; j++) {
                grid[i][j] = null;
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.row = i;
                cell.dataset.col = j;
                cell.addEventListener('click', handleCellClick);
                board.appendChild(cell);
            }
        }
    }

    function getRandomEmptyCell() {
        let emptyCells = [];
        for (let r=0; r<10; r++) {
            for (let c=0; c<10; c++) {
                if(!grid[r][c]) emptyCells.push({row:r, col:c});
            }
        }
        if(emptyCells.length === 0) return null;
        return emptyCells[Math.floor(Math.random() * emptyCells.length)];
    }

    function placeRandomBall(isBonus = false) {
        const cellInfo = getRandomEmptyCell();
        if(!cellInfo) return;
        
        const color = colors[Math.floor(Math.random() * colors.length)];
        const ball = document.createElement('div');
        ball.className = `ball ${color} ${isBonus ? 'bonus-ball' : ''}`;
        
        const cell = board.children[cellInfo.row * 10 + cellInfo.col];
        cell.appendChild(ball);
        grid[cellInfo.row][cellInfo.col] = { color, element: ball, bonus: isBonus };
    }

    function handleCellClick(e) {
		const r = parseInt(e.currentTarget.dataset.row);
		const c = parseInt(e.currentTarget.dataset.col);

		if (!grid[r][c]) {
			if (selectedBall) moveSelectedBall(r, c);
		} else {
			selectBall(r, c);
		}
	}
    
	let animInterval;
    function selectBall(r, c) {
        if (selectedBall) stopAnim(selectedBall.row, selectedBall.col);
        selectedBall = { row: r, col: c };
        
        const el = grid[r][c].element;
        let scale = 1;
        let dir = 0.05;
        animInterval = setInterval(() => {
            scale += dir;
            if(scale > 1.2 || scale < 0.8) dir = -dir;
            el.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }, 50);
    }

    function stopAnim(r, c) {
        clearInterval(animInterval);
        if(grid[r] && grid[r][c]) {
            grid[r][c].element.style.transform = `translate(-50%, -50%) scale(1)`;
        }
        selectedBall = null;
    }

    function findPath(sr, sc, er, ec) {
        const q = [[sr, sc, []]];
        const visited = new Set([`${sr}-${sc}`]);
        const moves = [[-1,0], [1,0], [0,-1], [0,1]];

        while (q.length > 0) {
            const [r, c, path] = q.shift();
            if (r === er && c === ec) return [...path, [er, ec]];

            for (const [dr, dc] of moves) {
                const nr = r + dr, nc = c + dc;
                if (nr>=0 && nr<10 && nc>=0 && nc<10 && !grid[nr][nc] && !visited.has(`${nr}-${nc}`)) {
                    visited.add(`${nr}-${nc}`);
                    q.push([nr, nc, [...path, [r, c]]]);
                }
            }
        }
        return null;
    }

    async function moveSelectedBall(nr, nc) {
        const sr = selectedBall.row, sc = selectedBall.col;
        const path = findPath(sr, sc, nr, nc);
        if (!path) return;

        stopAnim(sr, sc);
        const data = grid[sr][sc];
        grid[sr][sc] = null;

        for (let i = 1; i < path.length; i++) {
            await new Promise(res => setTimeout(res, 25));
            board.children[path[i][0] * 10 + path[i][1]].appendChild(data.element);
        }
        grid[nr][nc] = data;

        const removed = checkLines();
        if (removed > 0) {
            addScore(removed * 100 + (data.bonus ? 500 : 0));
        } else {
            if(Date.now() - lastMoveTime > COMBO_TIMEOUT) comboMultiplier = 1;
            document.getElementById('combo').textContent = `x${comboMultiplier}`;
            
            if(!checkGameOver()) {
                placeRandomBall();
                placeRandomBall();
                if(Math.random() < 0.1) placeRandomBall(true);
                checkLines();
                checkGameOver();
            }
        }
        lastMoveTime = Date.now();
    }

    function checkLines() {
        let toRemove = new Set();
        
        const checkDir = (r, c, dr, dc) => {
            if(!grid[r][c]) return;
            let line = [`${r}-${c}`];
            let color = grid[r][c].color;
            let nr = r + dr, nc = c + dc;
            
            while(nr>=0 && nr<10 && nc>=0 && nc<10 && grid[nr][nc] && grid[nr][nc].color === color) {
                line.push(`${nr}-${nc}`);
                nr += dr; nc += dc;
            }
            if(line.length >= 5) line.forEach(p => toRemove.add(p));
        };

        for(let r=0; r<10; r++) {
            for(let c=0; c<10; c++) {
                checkDir(r, c, 0, 1);
                checkDir(r, c, 1, 0);
                checkDir(r, c, 1, 1);
                checkDir(r, c, 1, -1);
            }
        }

        if(toRemove.size > 0) {
            let bonusPoints = 0;
            toRemove.forEach(p => {
                const [r, c] = p.split('-').map(Number);
                if(grid[r][c].bonus) bonusPoints += 300;
                board.children[r * 10 + c].innerHTML = '';
                grid[r][c] = null;
            });
            linesRemoved++;
            document.getElementById('lines-removed-count').textContent = linesRemoved;
            return toRemove.size + bonusPoints/100;
        }
        return 0;
    }

    function addScore(pts) {
        if(Date.now() - lastMoveTime < COMBO_TIMEOUT) comboMultiplier++;
        else comboMultiplier = 1;
        
        const finalPts = pts * comboMultiplier;
        score += finalPts;
        
        const floatText = document.createElement('div');
        floatText.className = 'combo-text';
        floatText.textContent = `+${finalPts}`;
        board.appendChild(floatText);
        setTimeout(() => floatText.remove(), 1000);

        if(score > highScore) {
            highScore = score;
            localStorage.setItem('linesHighScore', highScore);
        }
        
        document.getElementById('score').textContent = score;
        document.getElementById('high-score').textContent = highScore;
        document.getElementById('combo').textContent = `x${comboMultiplier}`;
    }

    function checkGameOver() {
        let empty = 0;
        for(let r=0; r<10; r++) for(let c=0; c<10; c++) if(!grid[r][c]) empty++;
        
        if (empty < 3) {
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-high-score').textContent = highScore;
            document.getElementById('gameOver').classList.add('show');
            return true;
        }
        return false;
    }

    function newGame() {
        document.getElementById('gameOver').classList.remove('show');
        score = 0; comboMultiplier = 1; linesRemoved = 0;
        document.getElementById('score').textContent = 0;
        document.getElementById('combo').textContent = 'x1';
        document.getElementById('lines-removed-count').textContent = 0;
        createBoard();
        for(let i=0; i<3; i++) placeRandomBall();
    }

    window.onload = init;
</script>

</body>
</html>
