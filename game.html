<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cyber Nodes Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme (Default in CSS structure, but overridden by JS if dark is preferred) */
            --bg-color: rgba(255, 255, 255, 0.95);
            --grid-line: rgba(100, 116, 139, 0.2);
            --text-color: #1e293b;
            --accent-cyan: #0284c7;
            --accent-pink: #db2777;
            --accent-green: #16a34a;
            --accent-yellow: #d97706;
            --accent-purple: #9333ea;
            --shadow-glow: rgba(2, 132, 199, 0.25);
            --board-bg: rgba(241, 245, 249, 0.8);
            --cell-bg: rgba(255, 255, 255, 0.5);
            --cell-border: rgba(148, 163, 184, 0.3);
            --cell-hover: rgba(2, 132, 199, 0.1);
        }

        body.dark-theme {
            --bg-color: rgba(15, 23, 42, 0.85);
            --grid-line: rgba(56, 189, 248, 0.15);
            --text-color: #e2e8f0;
            --accent-cyan: #38bdf8;
            --accent-pink: #ec4899;
            --accent-green: #22c55e;
            --accent-yellow: #eab308;
            --accent-purple: #a855f7;
            --shadow-glow: rgba(56, 189, 248, 0.4);
            --board-bg: rgba(0, 0, 0, 0.5);
            --cell-bg: rgba(255, 255, 255, 0.03);
            --cell-border: rgba(255, 255, 255, 0.05);
            --cell-hover: rgba(56, 189, 248, 0.1);
        }

        body {
            font-family: 'Fira Code', monospace;
            background-color: transparent;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
            box-sizing: border-box;
            overflow: hidden;
            transition: color 0.3s ease;
        }

        #game-container {
            width: 100%;
            max-width: 420px;
            height: 100%;
            margin: 0 auto;
            background: var(--bg-color);
            backdrop-filter: blur(10px);
            border: 1px solid var(--accent-cyan);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.1), inset 0 0 20px var(--shadow-glow);
            text-align: center;
            position: relative;
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .dark-theme #game-container {
             box-shadow: 0 0 30px rgba(0, 0, 0, 0.6), inset 0 0 20px var(--shadow-glow);
        }

        h1 {
            font-size: 1.1rem;
            margin: 0 0 10px 0;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--shadow-glow);
            flex-shrink: 0;
        }

        h1::before { content: '>_ '; color: var(--text-color); }

        .score-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px;
            background: var(--board-bg);
            border: 1px solid var(--cell-border);
            border-radius: 8px;
            flex-shrink: 0;
        }

        .score-item {
            font-size: 0.8rem;
            color: var(--text-color);
            opacity: 0.8;
        }
        
        .score-item span {
            color: var(--accent-cyan);
            font-weight: bold;
            font-size: 1rem;
            text-shadow: 0 0 8px var(--shadow-glow);
        }

        #board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
            margin: 0 auto;
            width: 100%;
            max-width: 50vh; /* Ограничиваем высоту поля */
            aspect-ratio: 1;
            background: var(--board-bg);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--grid-line);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
            flex-shrink: 1;
            min-height: 0; /* Для работы flex-shrink */
        }

        .dark-theme #board {
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        .cell {
            aspect-ratio: 1;
            width: 100%;
            background: var(--cell-bg);
            border: 1px solid var(--cell-border);
            cursor: pointer;
            position: relative;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .cell:hover {
            background: var(--cell-hover);
            border-color: var(--accent-cyan);
        }

        .ball {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 70%;
            border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .ball::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 30%; height: 30%;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 5px #fff;
        }

        /* Неоновые цвета узлов (Cyberpunk палитра) */
        .cyan { background: var(--accent-cyan); box-shadow: 0 0 15px var(--accent-cyan); }
        .pink { background: var(--accent-pink); box-shadow: 0 0 15px var(--accent-pink); }
        .green { background: var(--accent-green); box-shadow: 0 0 15px var(--accent-green); }
        .yellow { background: var(--accent-yellow); box-shadow: 0 0 15px var(--accent-yellow); }
        .purple { background: var(--accent-purple); box-shadow: 0 0 15px var(--accent-purple); }

        .bonus-ball {
            border: 2px solid #fff;
            animation: pulse-bonus 1s infinite alternate;
        }

        @keyframes pulse-bonus {
            0% { transform: translate(-50%, -50%) scale(0.9); filter: brightness(1); }
            100% { transform: translate(-50%, -50%) scale(1.1); filter: brightness(1.5); }
        }

        #controls {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 8px 16px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: rgba(56, 189, 248, 0.2);
            box-shadow: 0 0 15px var(--shadow-glow);
            text-shadow: 0 0 5px var(--accent-cyan);
        }

        .combo-text {
            position: absolute;
            color: #fff;
            font-weight: bold;
            font-size: 1.2em;
            text-shadow: 0 0 10px var(--accent-cyan);
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-40px); opacity: 0; }
        }

        .game-over {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            border-radius: 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .game-over.show {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over h2 {
            color: #ff5f56;
            font-size: 2rem;
            text-shadow: 0 0 20px rgba(255, 95, 86, 0.5);
            margin-bottom: 10px;
        }

        .high-score { color: var(--accent-yellow); margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>System Nodes</h1>
    <div class="score-panel">
        <div class="score-item">SCORE<br><span id="score">0</span></div>
        <div class="score-item">COMBO<br><span id="combo">x1</span></div>
        <div class="score-item">BEST<br><span id="high-score">0</span></div>
    </div>
    
    <div id="board"></div>
    
    <div id="controls">
        <div class="score-item" style="text-align: left;">LINES<br><span id="lines-removed-count">0</span></div>
        <button id="new-game-button">REBOOT_SYS()</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>SYSTEM FAILURE</h2>
        <div class="score-item" style="margin-bottom: 10px;">FINAL SCORE: <span id="final-score">0</span></div>
        <div class="high-score">RECORD: <span id="final-high-score">0</span></div>
        <button id="restart-button">RETRY_CONNECTION</button>
    </div>
</div>

<script>
    const board = document.getElementById('board');
    const colors = ['cyan', 'pink', 'green', 'yellow', 'purple'];
    let grid = [];
    let selectedBall = null;
    let score = 0;
    let highScore = localStorage.getItem('linesHighScore') || 0;
    let comboMultiplier = 1;
    let linesRemoved = 0;
    let lastMoveTime = Date.now();
    const COMBO_TIMEOUT = 5000;

    function init() {
        // Theme initialization
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'dark') document.body.classList.add('dark-theme');
        
        window.addEventListener('message', (event) => {
            if (event.data.type === 'theme') {
                if (event.data.theme === 'dark') document.body.classList.add('dark-theme');
                else document.body.classList.remove('dark-theme');
            }
        });

        document.getElementById('high-score').textContent = highScore;
        document.getElementById('new-game-button').addEventListener('click', newGame);
        document.getElementById('restart-button').addEventListener('click', newGame);
        newGame();
    }

    function createBoard() {
        board.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            grid[i] = [];
            for (let j = 0; j < 10; j++) {
                grid[i][j] = null;
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.row = i;
                cell.dataset.col = j;
                cell.addEventListener('click', handleCellClick);
                board.appendChild(cell);
            }
        }
    }

    function getRandomEmptyCell() {
        let emptyCells = [];
        for (let r=0; r<10; r++) {
            for (let c=0; c<10; c++) {
                if(!grid[r][c]) emptyCells.push({row:r, col:c});
            }
        }
        if(emptyCells.length === 0) return null;
        return emptyCells[Math.floor(Math.random() * emptyCells.length)];
    }

    function placeRandomBall(isBonus = false) {
        const cellInfo = getRandomEmptyCell();
        if(!cellInfo) return;
        
        const color = colors[Math.floor(Math.random() * colors.length)];
        const ball = document.createElement('div');
        ball.className = `ball ${color} ${isBonus ? 'bonus-ball' : ''}`;
        
        const cell = board.children[cellInfo.row * 10 + cellInfo.col];
        cell.appendChild(ball);
        grid[cellInfo.row][cellInfo.col] = { color, element: ball, bonus: isBonus };
    }

    function handleCellClick(e) {
		// Замените e.target на e.currentTarget
		const r = parseInt(e.currentTarget.dataset.row);
		const c = parseInt(e.currentTarget.dataset.col);

		if (!grid[r][c]) {
			if (selectedBall) moveSelectedBall(r, c);
		} else {
			selectBall(r, c);
		}
	}
    
	let animInterval;
    function selectBall(r, c) {
        if (selectedBall) stopAnim(selectedBall.row, selectedBall.col);
        selectedBall = { row: r, col: c };
        
        const el = grid[r][c].element;
        let scale = 1;
        let dir = 0.05;
        animInterval = setInterval(() => {
            scale += dir;
            if(scale > 1.2 || scale < 0.8) dir = -dir;
            el.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }, 50);
    }

    function stopAnim(r, c) {
        clearInterval(animInterval);
        if(grid[r] && grid[r][c]) {
            grid[r][c].element.style.transform = `translate(-50%, -50%) scale(1)`;
        }
        selectedBall = null;
    }

    function findPath(sr, sc, er, ec) {
        const q = [[sr, sc, []]];
        const visited = new Set([`${sr}-${sc}`]);
        const moves = [[-1,0], [1,0], [0,-1], [0,1]];

        while (q.length > 0) {
            const [r, c, path] = q.shift();
            if (r === er && c === ec) return [...path, [er, ec]];

            for (const [dr, dc] of moves) {
                const nr = r + dr, nc = c + dc;
                if (nr>=0 && nr<10 && nc>=0 && nc<10 && !grid[nr][nc] && !visited.has(`${nr}-${nc}`)) {
                    visited.add(`${nr}-${nc}`);
                    q.push([nr, nc, [...path, [r, c]]]);
                }
            }
        }
        return null;
    }

    async function moveSelectedBall(nr, nc) {
        const sr = selectedBall.row, sc = selectedBall.col;
        const path = findPath(sr, sc, nr, nc);
        if (!path) return;

        stopAnim(sr, sc);
        const data = grid[sr][sc];
        grid[sr][sc] = null;

        // Быстрая телепортация по узлам
        for (let i = 1; i < path.length; i++) {
            await new Promise(res => setTimeout(res, 25));
            board.children[path[i][0] * 10 + path[i][1]].appendChild(data.element);
        }
        grid[nr][nc] = data;

        const removed = checkLines();
        if (removed > 0) {
            addScore(removed * 100 + (data.bonus ? 500 : 0));
        } else {
            if(Date.now() - lastMoveTime > COMBO_TIMEOUT) comboMultiplier = 1;
            document.getElementById('combo').textContent = `x${comboMultiplier}`;
            
            if(!checkGameOver()) {
                placeRandomBall();
                placeRandomBall();
                if(Math.random() < 0.1) placeRandomBall(true);
                checkLines(); // Проверка после появления новых
                checkGameOver();
            }
        }
        lastMoveTime = Date.now();
    }

    function checkLines() {
        let toRemove = new Set();
        
        const checkDir = (r, c, dr, dc) => {
            if(!grid[r][c]) return;
            let line = [`${r}-${c}`];
            let color = grid[r][c].color;
            let nr = r + dr, nc = c + dc;
            
            while(nr>=0 && nr<10 && nc>=0 && nc<10 && grid[nr][nc] && grid[nr][nc].color === color) {
                line.push(`${nr}-${nc}`);
                nr += dr; nc += dc;
            }
            if(line.length >= 5) line.forEach(p => toRemove.add(p));
        };

        for(let r=0; r<10; r++) {
            for(let c=0; c<10; c++) {
                checkDir(r, c, 0, 1); // Горизонталь
                checkDir(r, c, 1, 0); // Вертикаль
                checkDir(r, c, 1, 1); // Диаг 1
                checkDir(r, c, 1, -1); // Диаг 2
            }
        }

        if(toRemove.size > 0) {
            let bonusPoints = 0;
            toRemove.forEach(p => {
                const [r, c] = p.split('-').map(Number);
                if(grid[r][c].bonus) bonusPoints += 300;
                board.children[r * 10 + c].innerHTML = '';
                grid[r][c] = null;
            });
            linesRemoved++;
            document.getElementById('lines-removed-count').textContent = linesRemoved;
            return toRemove.size + bonusPoints/100; // Грубый расчет очков
        }
        return 0;
    }

    function addScore(pts) {
        if(Date.now() - lastMoveTime < COMBO_TIMEOUT) comboMultiplier++;
        else comboMultiplier = 1;
        
        const finalPts = pts * comboMultiplier;
        score += finalPts;
        
        const floatText = document.createElement('div');
        floatText.className = 'combo-text';
        floatText.textContent = `+${finalPts}`;
        board.appendChild(floatText);
        setTimeout(() => floatText.remove(), 1000);

        if(score > highScore) {
            highScore = score;
            localStorage.setItem('linesHighScore', highScore);
        }
        
        document.getElementById('score').textContent = score;
        document.getElementById('high-score').textContent = highScore;
        document.getElementById('combo').textContent = `x${comboMultiplier}`;
    }

    function checkGameOver() {
        let empty = 0;
        for(let r=0; r<10; r++) for(let c=0; c<10; c++) if(!grid[r][c]) empty++;
        
        if (empty < 3) {
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-high-score').textContent = highScore;
            document.getElementById('gameOver').classList.add('show');
            return true;
        }
        return false;
    }

    function newGame() {
        document.getElementById('gameOver').classList.remove('show');
        score = 0; comboMultiplier = 1; linesRemoved = 0;
        document.getElementById('score').textContent = 0;
        document.getElementById('combo').textContent = 'x1';
        document.getElementById('lines-removed-count').textContent = 0;
        createBoard();
        for(let i=0; i<3; i++) placeRandomBall();
    }

    window.onload = init;
</script>

</body>
</html>
