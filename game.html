<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Nodes — MK Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Fira+Code:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #07080c;
            --surface-bg: #0e121a;
            --board-bg: #151a24;
            --cell-bg: #0b0f17;
            --cell-border: rgba(255, 255, 255, 0.12);
            --cell-hover: #1e2636;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #ff9d00;
            --accent-secondary: #ffb700;
            
            /* Цвета шариков для темной темы */
            --color-1: #ff9d00; /* Янтарный */
            --color-2: #38bdf8; /* Голубой */
            --color-3: #4ade80; /* Зеленый */
            --color-4: #c084fc; /* Фиолетовый */
            --color-5: #fb7185; /* Розовый */
        }

        /* Светлая тема */
        body.light-theme {
            --bg-color: #f8fafc;
            --surface-bg: #ffffff;
            --board-bg: #e2e8f0;
            --cell-bg: #ffffff;
            --cell-border: rgba(15, 23, 42, 0.18);
            --cell-hover: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent-primary: #d97706;
            --accent-secondary: #f59e0b;
            
            /* Яркие, контрастные цвета шариков для светлой темы */
            --color-1: #d97706; /* Янтарный */
            --color-2: #0284c7; /* Синий */
            --color-3: #16a34a; /* Зеленый */
            --color-4: #9333ea; /* Фиолетовый */
            --color-5: #e11d48; /* Красный */
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text-main);
            background: var(--bg-color);
            position: relative;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
          
        #game-wrapper {
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            background: var(--surface-bg);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--cell-border);
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 14px; 
        }
        
        .title { 
            font-family: 'Orbitron', sans-serif;
            font-weight: 800; 
            font-size: 1.15rem; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            margin: 0; 
            color: var(--text-main);
            letter-spacing: 1px;
        }
        .title i { color: var(--accent-primary); }

        .score-board { display: flex; gap: 14px; }
        .score-box { text-align: right; }
        .score-label { 
            font-size: 0.72rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            font-weight: 600;
            margin-bottom: 2px;
        }
        .score-value { 
            font-family: 'Fira Code', monospace; 
            font-size: 1.15rem; 
            font-weight: 700; 
            color: var(--text-main); 
        }
        .score-value.highlight { color: var(--accent-primary); }

        #board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            background: var(--board-bg);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid var(--cell-border);
            aspect-ratio: 1;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
            position: relative;
            width: 100%;
            max-width: 100%;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .cell {
            background: var(--cell-bg);
            border: 1px solid var(--cell-border);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            transition: background 0.15s ease, border-color 0.15s ease;
            overflow: hidden;
            width: 100%;
            aspect-ratio: 1;
            touch-action: manipulation;
        }
        .cell:hover { background: var(--cell-hover); }

        .ball {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 68%; height: 68%;
            border-radius: 50%;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.3), 0 3px 6px rgba(0,0,0,0.25);
            transition: none;
        }

        .c1 { background: radial-gradient(circle at 30% 30%, #fef3c7, var(--color-1)); }
        .c2 { background: radial-gradient(circle at 30% 30%, #e0f2fe, var(--color-2)); }
        .c3 { background: radial-gradient(circle at 30% 30%, #dcfce7, var(--color-3)); }
        .c4 { background: radial-gradient(circle at 30% 30%, #f3e8ff, var(--color-4)); }
        .c5 { background: radial-gradient(circle at 30% 30%, #ffe4e6, var(--color-5)); }

        .bonus-ball::after {
            content: '★'; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 11px; color: #ffffff; text-shadow: 0 0 4px rgba(0,0,0,0.6);
        }

        .controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 16px; 
        }
        
        .btn {
            background: var(--accent-primary);
            color: #ffffff;
            border: none;
            padding: 10px 22px;
            border-radius: 12px;
            font-family: 'Inter', sans-serif; 
            font-weight: 700; 
            font-size: 0.9rem;
            cursor: pointer; 
            transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
            display: flex; 
            align-items: center; 
            gap: 8px;
            box-shadow: 0 4px 14px rgba(217, 119, 6, 0.3);
        }
        .btn:hover { 
            transform: translateY(-2px); 
            opacity: 0.95;
            box-shadow: 0 6px 18px rgba(217, 119, 6, 0.4);
        }

        .combo-text {
            position: absolute; 
            color: var(--accent-primary); 
            font-weight: 800; 
            font-family: 'Fira Code', monospace;
            animation: floatUp 1s ease-out forwards; 
            pointer-events: none; 
            z-index: 20;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-30px); opacity: 0; } }

        /* Окно окончания игры */
        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--surface-bg);
            border-radius: 16px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 100;
        }
        .overlay.show { opacity: 0.96; pointer-events: auto; }
        
        .overlay h2 { margin: 0 0 6px; font-size: 1.7rem; color: var(--text-main); font-weight: 700; }
        .overlay p { color: var(--text-muted); margin-bottom: 20px; font-size: 0.95rem; }
        .final-score { font-size: 2.8rem; font-family: 'Fira Code', monospace; font-weight: 700; color: var(--accent-primary); margin-bottom: 24px;}

        /* Мобильная адаптация */
        @media (max-width: 500px) {
            #game-wrapper {
                padding: 12px;
                max-width: 96%;
            }
            .header { margin-bottom: 10px; }
            .title { font-size: 1rem; }
            .score-board { gap: 10px; }
            .score-label { font-size: 0.65rem; }
            .score-value { font-size: 1rem; }
            #board { gap: 2px; padding: 4px; }
            .controls { margin-top: 12px; }
            .btn { padding: 8px 16px; font-size: 0.82rem; }
            .final-score { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="header">
        <h1 class="title"><i class="fas fa-project-diagram"></i> MK Nodes</h1>
        <div class="score-board">
            <div class="score-box">
                <div class="score-label">Комбо</div>
                <div class="score-value" id="combo">x1</div>
            </div>
            <div class="score-box">
                <div class="score-label">Рекорд</div>
                <div class="score-value" id="high-score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Очки</div>
                <div class="score-value highlight" id="score">0</div>
            </div>
        </div>
    </div>

    <div id="board">
        <div class="overlay" id="gameOver">
            <h2>Игра окончена</h2>
            <p>Нет свободных узлов сети</p>
            <div class="final-score" id="final-score">0</div>
            <button class="btn" id="restart-button"><i class="fas fa-redo"></i> Начать заново</button>
        </div>
    </div>
    
    <div class="controls">
        <div class="score-box" style="text-align: left;">
            <div class="score-label">Собрано линий</div>
            <div class="score-value" id="lines-removed" style="font-size: 1rem;">0</div>
        </div>
        <button class="btn" id="new-game-button"><i class="fas fa-sync-alt"></i> Рестарт</button>
    </div>
</div>

<script>
    function syncTheme() {
        try {
            let isLight = false;
            if (localStorage.getItem('theme') === 'light') {
                isLight = true;
            } else if (window.parent && window.parent.document && window.parent.document.body) {
                isLight = window.parent.document.body.classList.contains('light-theme');
            }
            if (isLight) {
                document.body.classList.add('light-theme');
            } else {
                document.body.classList.remove('light-theme');
            }
        } catch (e) {
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-theme');
            } else {
                document.body.classList.remove('light-theme');
            }
        }
    }

    syncTheme();
    setInterval(syncTheme, 500);
    window.addEventListener('storage', syncTheme);
    window.addEventListener('message', (e) => {
        if (e.data && e.data.theme) {
            if (e.data.theme === 'light') document.body.classList.add('light-theme');
            else document.body.classList.remove('light-theme');
        }
    });

    const SoundManager = {
        ctx: null,
        init() {
            if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (this.ctx.state === 'suspended') this.ctx.resume();
        },
        play(freq, type, duration, volume = 0.1) {
            this.init();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            gain.gain.setValueAtTime(volume, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },
        select() { this.play(440, 'sine', 0.1); },
        match() { this.play(880, 'sine', 0.2); },
        combo() { this.play(1200, 'sine', 0.15); },
        gameOver() { this.play(220, 'sawtooth', 0.5, 0.05); },
        restart() { this.play(660, 'sine', 0.2); }
    };

    const board = document.getElementById('board');
    const overlay = document.getElementById('gameOver');
    const colors = ['c1', 'c2', 'c3', 'c4', 'c5'];
    let grid = [];
    let selectedBall = null;
    let score = 0;
    let highScore = Number(localStorage.getItem('nodesHighScore')) || 0;
    let comboMultiplier = 1;
    let linesRemoved = 0;
    let lastMoveTime = Date.now();
    let isMoving = false;
    const COMBO_TIMEOUT = 5000;

    function init() {
        document.getElementById('high-score').textContent = highScore;
        document.getElementById('new-game-button').addEventListener('click', newGame);
        document.getElementById('restart-button').addEventListener('click', newGame);
        newGame();
    }

    function createBoard() {
        Array.from(board.children).forEach(child => { if(child.id !== 'gameOver') child.remove(); });
        
        for (let i = 0; i < 10; i++) {
            grid[i] = [];
            for (let j = 0; j < 10; j++) {
                grid[i][j] = null;
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.row = i;
                cell.dataset.col = j;
                cell.addEventListener('click', handleCellClick);
                board.appendChild(cell);
            }
        }
    }

    function getRandomEmptyCell() {
        let emptyCells = [];
        for (let r=0; r<10; r++) for (let c=0; c<10; c++) if(!grid[r][c]) emptyCells.push({row:r, col:c});
        if(emptyCells.length === 0) return null;
        return emptyCells[Math.floor(Math.random() * emptyCells.length)];
    }

    function placeRandomBall(isBonus = false) {
        const cellInfo = getRandomEmptyCell();
        if(!cellInfo) return;
          
        const color = colors[Math.floor(Math.random() * colors.length)];
        const ball = document.createElement('div');
        ball.className = `ball ${color} ${isBonus ? 'bonus-ball' : ''}`;
          
        const cell = board.querySelector(`[data-row="${cellInfo.row}"][data-col="${cellInfo.col}"]`);
        cell.appendChild(ball);
        grid[cellInfo.row][cellInfo.col] = { color, element: ball, bonus: isBonus };
    }

    function handleCellClick(e) {
        if (isMoving) return;
        const r = parseInt(e.currentTarget.dataset.row);
        const c = parseInt(e.currentTarget.dataset.col);

        if (!grid[r][c]) {
            if (selectedBall) moveSelectedBall(r, c);
        } else {
            selectBall(r, c);
        }
    }
    
    let animInterval;
    function selectBall(r, c) {
        if (selectedBall) stopAnim(selectedBall.row, selectedBall.col);
        selectedBall = { row: r, col: c };
        SoundManager.select();
        
        const el = grid[r][c].element;
        el.style.transition = 'none';
        let scale = 1;
        let dir = 0.008;
        animInterval = setInterval(() => {
            scale += dir;
            if(scale > 1.04 || scale < 0.96) dir = -dir;
            el.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }, 50);
    }

    function stopAnim(r, c) {
        clearInterval(animInterval);
        if(grid[r] && grid[r][c]) {
            grid[r][c].element.style.transform = `translate(-50%, -50%) scale(1)`;
        }
        selectedBall = null;
    }

    function findPath(sr, sc, er, ec) {
        const q = [[sr, sc, []]];
        const visited = new Set([`${sr}-${sc}`]);
        const moves = [[-1,0], [1,0], [0,-1], [0,1]];

        while (q.length > 0) {
            const [r, c, path] = q.shift();
            if (r === er && c === ec) return [...path, [er, ec]];

            for (const [dr, dc] of moves) {
                const nr = r + dr, nc = c + dc;
                if (nr>=0 && nr<10 && nc>=0 && nc<10 && !grid[nr][nc] && !visited.has(`${nr}-${nc}`)) {
                    visited.add(`${nr}-${nc}`);
                    q.push([nr, nc, [...path, [r, c]]]);
                }
            }
        }
        return null;
    }

    async function moveSelectedBall(nr, nc) {
        const sr = selectedBall.row, sc = selectedBall.col;
        const path = findPath(sr, sc, nr, nc);
        if (!path) return;

        isMoving = true;
        stopAnim(sr, sc);

        const data = grid[sr][sc];
        grid[sr][sc] = null;

        for (let i = 1; i < path.length; i++) {
            await new Promise(res => setTimeout(res, 20));
            const cell = board.querySelector(`[data-row="${path[i][0]}"][data-col="${path[i][1]}"]`);
            cell.appendChild(data.element);
        }
        grid[nr][nc] = data;

        const linePoints = checkLines();
        if (linePoints > 0) {
            SoundManager.match();
            addScore(linePoints + (data.bonus ? 500 : 0));
        } else {
            if(Date.now() - lastMoveTime > COMBO_TIMEOUT) comboMultiplier = 1;
            document.getElementById('combo').textContent = `x${comboMultiplier}`;

            placeRandomBall(); placeRandomBall();
            if(Math.random() < 0.1) placeRandomBall(true);

            const autoPoints = checkLines();
            if (autoPoints > 0) {
                SoundManager.match();
                addScore(autoPoints);
            }
            checkGameOver();
        }
        lastMoveTime = Date.now();
        isMoving = false;
    }

    function checkLines() {
        let toRemove = new Set();
        const checkDir = (r, c, dr, dc) => {
            if(!grid[r][c]) return;
            let line = [`${r}-${c}`];
            let color = grid[r][c].color;
            let nr = r + dr, nc = c + dc;
            
            while(nr>=0 && nr<10 && nc>=0 && nc<10 && grid[nr][nc] && grid[nr][nc].color === color) {
                line.push(`${nr}-${nc}`);
                nr += dr; nc += dc;
            }
            if(line.length >= 5) line.forEach(p => toRemove.add(p));
        };

        for(let r=0; r<10; r++) {
            for(let c=0; c<10; c++) {
                checkDir(r, c, 0, 1); checkDir(r, c, 1, 0);
                checkDir(r, c, 1, 1); checkDir(r, c, 1, -1);
            }
        }

        if(toRemove.size > 0) {
            let bonusPoints = 0;
            toRemove.forEach(p => {
                const [r, c] = p.split('-').map(Number);
                if(grid[r][c].bonus) bonusPoints += 300;
                const cell = board.querySelector(`[data-row="${r}"][data-col="${c}"]`);
                cell.innerHTML = '';
                grid[r][c] = null;
            });
            linesRemoved++;
            document.getElementById('lines-removed').textContent = linesRemoved;
            return toRemove.size * 100 + bonusPoints;
        }
        return 0;
    }

    function addScore(pts) {
        if(Date.now() - lastMoveTime < COMBO_TIMEOUT) comboMultiplier++;
        else comboMultiplier = 1;
        
        if(comboMultiplier > 1) SoundManager.combo();
        
        const finalPts = pts * comboMultiplier;
        score += finalPts;
        
        const floatText = document.createElement('div');
        floatText.className = 'combo-text';
        floatText.textContent = `+${finalPts}`;
        floatText.style.top = '50%'; floatText.style.left = '50%';
        board.appendChild(floatText);
        setTimeout(() => floatText.remove(), 1000);

        if(score > highScore) {
            highScore = score;
            localStorage.setItem('nodesHighScore', highScore);
        }
        
        document.getElementById('score').textContent = score;
        document.getElementById('high-score').textContent = highScore;
        document.getElementById('combo').textContent = `x${comboMultiplier}`;
    }

    function checkGameOver() {
        let empty = 0;
        for(let r=0; r<10; r++) for(let c=0; c<10; c++) if(!grid[r][c]) empty++;
        
        if (empty < 3) {
            SoundManager.gameOver();
            document.getElementById('final-score').textContent = score;
            overlay.classList.add('show');
            return true;
        }
        return false;
    }

    function newGame() {
        SoundManager.restart();
        overlay.classList.remove('show');
        score = 0; comboMultiplier = 1; linesRemoved = 0;
        document.getElementById('score').textContent = 0;
        document.getElementById('combo').textContent = 'x1';
        document.getElementById('lines-removed').textContent = 0;
        createBoard();
        for(let i=0; i<3; i++) placeRandomBall();
    }

    window.onload = init;
</script>
</body>
</html>
